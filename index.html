<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/buki-rush/favicon.svg" />
    <link rel="manifest" href="/buki-rush/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/buki-rush/icons/icon-192.png" />
    <meta name="theme-color" content="#b7132d" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="ブキラッシュ" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ブキラッシュ</title>
    <script>
      const titleBackgroundUrl = new URL('assets/generated/title-ichigo.png', window.location.href).toString();
      document.documentElement.style.setProperty(
        '--app-background',
        `linear-gradient(rgba(42, 13, 8, 0.24), rgba(22, 10, 8, 0.62)), url("${titleBackgroundUrl}") center / cover no-repeat, radial-gradient(circle at top, #7f1d1d 0%, #2a0d08 54%, #160a08 100%)`,
      );
    </script>
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        background: var(--app-background, radial-gradient(circle at top, #7f1d1d 0%, #2a0d08 54%, #160a08 100%));
      }

      #initial-loader {
        position: fixed;
        inset: 0;
        z-index: 1000;
        display: grid;
        place-items: center;
        overflow: hidden;
        background: var(--app-background, radial-gradient(circle at top, #7f1d1d 0%, #2a0d08 54%, #160a08 100%));
        color: #fff7ed;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        transition: opacity 420ms ease, transform 420ms ease;
      }

      #initial-loader.is-hidden {
        opacity: 0;
        transform: scale(1.03);
        pointer-events: none;
      }

      .initial-loader__panel {
        display: grid;
        gap: 18px;
        justify-items: center;
        width: min(76vw, 320px);
        text-align: center;
        filter: drop-shadow(0 16px 38px rgba(91, 11, 18, 0.5));
      }

      .initial-loader__berry {
        position: relative;
        width: 74px;
        height: 74px;
        border-radius: 55% 55% 58% 58%;
        background:
          radial-gradient(ellipse at 36% 28%, rgba(255, 255, 255, 0.55) 0 9%, transparent 10%),
          radial-gradient(circle at 34% 24%, #fecdd3 0 16%, #fb385f 42%, #b7132d 100%);
        box-shadow: inset -10px -14px 18px rgba(91, 11, 18, 0.28), 0 0 34px rgba(255, 71, 112, 0.28);
        animation: loaderPulse 920ms cubic-bezier(.34,1.56,.64,1) infinite alternate;
      }

      .initial-loader__berry::before {
        content: "";
        position: absolute;
        left: 13px;
        top: -14px;
        width: 48px;
        height: 30px;
        background: linear-gradient(135deg, #86efac, #15803d);
        clip-path: polygon(50% 68%, 0 34%, 30% 30%, 38% 0, 54% 28%, 78% 0, 72% 32%, 100% 36%);
      }

      .initial-loader__berry::after {
        content: "";
        position: absolute;
        inset: 18px 13px 12px;
        background-image:
          radial-gradient(ellipse at 10% 14%, #fff0a8 0 5%, transparent 6%),
          radial-gradient(ellipse at 58% 8%, #f7c85b 0 5%, transparent 6%),
          radial-gradient(ellipse at 32% 48%, #fff0a8 0 5%, transparent 6%),
          radial-gradient(ellipse at 76% 52%, #f7c85b 0 5%, transparent 6%),
          radial-gradient(ellipse at 48% 82%, #fff0a8 0 5%, transparent 6%);
        opacity: .85;
      }

      .initial-loader__title {
        font-size: 30px;
        font-weight: 900;
        letter-spacing: 0;
        color: #fff3cf;
        font-family: "Arial Rounded MT Bold", "Hiragino Maru Gothic ProN", "Yu Gothic", system-ui, sans-serif;
        text-shadow: 0 3px 0 #b7132d, 0 6px 0 #5b0b12, 0 0 26px rgba(255, 240, 179, 0.44);
        animation: titleJelly 1180ms ease-in-out infinite alternate;
      }

      .initial-loader__bar {
        width: 100%;
        height: 10px;
        overflow: hidden;
        border: 2px solid rgba(255, 240, 179, 0.9);
        border-radius: 999px;
        background: rgba(91, 11, 18, 0.78);
      }

      .initial-loader__bar::before {
        content: "";
        display: block;
        width: 42%;
        height: 100%;
        border-radius: inherit;
        background: linear-gradient(90deg, #ff4770, #fff0a8, #8ce99a);
        animation: loaderSlide 960ms ease-in-out infinite;
      }

      @keyframes loaderPulse {
        from { transform: translateY(0) scale(1); }
        to { transform: translateY(-8px) scale(1.08); }
      }

      @keyframes loaderSlide {
        from { transform: translateX(-110%); }
        to { transform: translateX(250%); }
      }

      @keyframes titleJelly {
        from { transform: translateY(0) scale(1); }
        to { transform: translateY(-3px) scale(1.035, .985); }
      }
    </style>
  </head>
  <body>
    <div id="initial-loader" aria-label="ロード中">
      <div class="initial-loader__panel">
        <div class="initial-loader__berry"></div>
        <div class="initial-loader__title">ブキラッシュ</div>
        <div class="initial-loader__bar"></div>
      </div>
    </div>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
