<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ブキラッシュ</title>
    <script>
      const titleBackgroundUrl = new URL('assets/generated/title-ichigo.png', window.location.href).toString();
      document.documentElement.style.setProperty(
        '--app-background',
        `linear-gradient(rgba(42, 13, 8, 0.24), rgba(22, 10, 8, 0.62)), url("${titleBackgroundUrl}") center / cover no-repeat, radial-gradient(circle at top, #7f1d1d 0%, #2a0d08 54%, #160a08 100%)`,
      );
    </script>
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        background: var(--app-background, radial-gradient(circle at top, #7f1d1d 0%, #2a0d08 54%, #160a08 100%));
      }

      #initial-loader {
        position: fixed;
        inset: 0;
        z-index: 1000;
        display: grid;
        place-items: center;
        overflow: hidden;
        background: var(--app-background, radial-gradient(circle at top, #7f1d1d 0%, #2a0d08 54%, #160a08 100%));
        color: #fff7ed;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        transition: opacity 420ms ease, transform 420ms ease;
      }

      #initial-loader.is-hidden {
        opacity: 0;
        transform: scale(1.03);
        pointer-events: none;
      }

      .initial-loader__panel {
        display: grid;
        gap: 18px;
        justify-items: center;
        width: min(76vw, 320px);
        text-align: center;
        filter: drop-shadow(0 16px 38px rgba(74, 15, 9, 0.45));
      }

      .initial-loader__berry {
        position: relative;
        width: 74px;
        height: 74px;
        border-radius: 55% 55% 58% 58%;
        background: radial-gradient(circle at 34% 24%, #fecdd3 0 16%, #fb385f 42%, #b91c1c 100%);
        animation: loaderPulse 920ms ease-in-out infinite alternate;
      }

      .initial-loader__berry::before {
        content: "";
        position: absolute;
        left: 13px;
        top: -14px;
        width: 48px;
        height: 30px;
        background: linear-gradient(135deg, #86efac, #15803d);
        clip-path: polygon(50% 68%, 0 34%, 30% 30%, 38% 0, 54% 28%, 78% 0, 72% 32%, 100% 36%);
      }

      .initial-loader__title {
        font-size: 28px;
        font-weight: 900;
        letter-spacing: 0;
        text-shadow: 0 3px 0 #7f1d1d, 0 0 26px rgba(254, 243, 199, 0.4);
      }

      .initial-loader__bar {
        width: 100%;
        height: 10px;
        overflow: hidden;
        border: 2px solid rgba(254, 215, 170, 0.86);
        border-radius: 999px;
        background: rgba(31, 9, 6, 0.72);
      }

      .initial-loader__bar::before {
        content: "";
        display: block;
        width: 42%;
        height: 100%;
        border-radius: inherit;
        background: linear-gradient(90deg, #fb7185, #fef08a, #86efac);
        animation: loaderSlide 960ms ease-in-out infinite;
      }

      @keyframes loaderPulse {
        from { transform: translateY(0) scale(1); }
        to { transform: translateY(-8px) scale(1.08); }
      }

      @keyframes loaderSlide {
        from { transform: translateX(-110%); }
        to { transform: translateX(250%); }
      }
    </style>
  </head>
  <body>
    <div id="initial-loader" aria-label="ロード中">
      <div class="initial-loader__panel">
        <div class="initial-loader__berry"></div>
        <div class="initial-loader__title">ブキラッシュ</div>
        <div class="initial-loader__bar"></div>
      </div>
    </div>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
